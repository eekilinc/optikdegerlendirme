name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
    
    - name: Extract Version from Tag
      id: get_version
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^v', ''
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Extracted version: $version"
    
    - name: Update Project Version
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $csproj = Get-Content "OptikFormApp.csproj"
        $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$version</Version>"
        $csproj = $csproj -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$version</AssemblyVersion>"
        $csproj = $csproj -replace '<FileVersion>.*?</FileVersion>', "<FileVersion>$version</FileVersion>"
        $csproj = $csproj -replace '<InformationalVersion>.*?</InformationalVersion>', "<InformationalVersion>$version</InformationalVersion>"
        Set-Content "OptikFormApp.csproj" $csproj
        echo "Updated version to $version"
    
    - name: Restore Dependencies
      run: dotnet restore OptikFormApp.csproj --runtime win-x64
    
    - name: Build
      run: dotnet build OptikFormApp.csproj -c Release --no-restore --runtime win-x64
    
    - name: Publish for Installer
      run: |
        dotnet publish OptikFormApp.csproj -c Release -o ./installer/publish --self-contained true --runtime win-x64
    
    - name: Create Installer with Inno Setup
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        # Update version in ISS file
        $issContent = Get-Content "installer\setup.iss" -Raw
        $issContent = $issContent -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
        Set-Content "installer\setup.iss" $issContent
        # Build installer
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\setup.iss"
    
    - name: Create ZIP Archive
      run: |
        cd installer/publish
        7z a -tzip ../../OptikDegerlendirme-v${{ steps.get_version.outputs.version }}-portable.zip *
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          installer/OptikDegerlendirme-v${{ steps.get_version.outputs.version }}-Setup.exe
          OptikDegerlendirme-v${{ steps.get_version.outputs.version }}-portable.zip
        name: Optik Değerlendirme v${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Yeni Sürüm: v${{ steps.get_version.outputs.version }}
          
          ### İndirme Seçenekleri
          
          **1. Kurulum Dosyası (Önerilen)**
          - OptikDegerlendirme-v${{ steps.get_version.outputs.version }}-Setup.exe
          - Windows'a kurulum yapar
          - Başlat menüsüne ekler
          - Otomatik kaldırma desteği
          
          **2. Taşınabilir Sürüm**
          - OptikDegerlendirme-v${{ steps.get_version.outputs.version }}-portable.zip
          - Kurulum gerekmez
          - USB'den çalıştırılabilir
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
