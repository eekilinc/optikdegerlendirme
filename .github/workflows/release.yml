name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Extract Version from Tag
      id: get_version
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^v', ''
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Extracted version: $version"
    
    - name: Update Project Version
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $csproj = Get-Content "OptikFormApp.csproj"
        $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$version</Version>"
        $csproj = $csproj -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$version</AssemblyVersion>"
        $csproj = $csproj -replace '<FileVersion>.*?</FileVersion>', "<FileVersion>$version</FileVersion>"
        $csproj = $csproj -replace '<InformationalVersion>.*?</InformationalVersion>', "<InformationalVersion>$version</InformationalVersion>"
        Set-Content "OptikFormApp.csproj" $csproj
        echo "Updated version to $version"
    
    - name: Restore Dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build -c Release --no-restore
    
    - name: Publish
      run: |
        dotnet publish -c Release -o ./publish --self-contained false --no-build
        cd publish
        7z a -tzip ../OptikDegerlendirme-v${{ steps.get_version.outputs.version }}.zip *
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: OptikDegerlendirme-v${{ steps.get_version.outputs.version }}.zip
        name: Optik Değerlendirme v${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
